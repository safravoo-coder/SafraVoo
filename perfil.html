<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7GR2ZW1K2X"></script>
  <script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date()); gtag('config', 'G-7GR2ZW1K2X');
  </script>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#16A34A"/>
  <title>SafraVoo — Perfil</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ══════════════════════════════════
     TELA PERFIL DA EMPRESA
══════════════════════════════════ -->
<div id="tela-perfil">

  <!-- CABEÇALHO COM BOTÃO VOLTAR -->
  <div class="perfil-header">
    <button class="back-btn" onclick="voltarHome()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#57534E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="m15 18-6-6 6-6"/>
      </svg>
    </button>
    <span class="perfil-title">Perfil da Empresa</span>
  </div>

  <!-- Loading -->
  <div id="loading-perfil" style="text-align:center;padding:60px 20px;">
    <div style="font-size:48px;margin-bottom:12px;">⏳</div>
    <div style="font-weight:700;font-size:16px;color:#1C1917;">Carregando perfil...</div>
    <div style="font-size:13px;color:#A8A29E;margin-top:4px;">Aguarde um momento</div>
  </div>

  <div class="perfil-hero-top" id="perfil-top" style="display:none;"></div>
  <div class="stats-grid" id="perfil-stats" style="display:none;"></div>
  <div class="perfil-body" id="perfil-body" style="display:none;"></div>
  <div class="cta-fixo" id="cta-fixo" style="display:none;"></div>

</div>

<script>
  // ════════════════════════════════════════════════════════
  // FUNÇÕES DE NAVEGAÇÃO
  // ════════════════════════════════════════════════════════

  // ===== VOLTAR (com histórico) =====
  function voltarHome() {
    window.history.back();
  }

  // ===== IR PARA AVALIAÇÃO =====
  function irParaAvaliacao() {
    const slug = getSlugFromURL();
    if (slug) {
      window.location.href = '/avaliar/' + slug;
    }
  }

  // ===== LER SLUG DA URL =====
  function getSlugFromURL() {
    const path = window.location.pathname;
    const partes = path.split('/');
    // /empresa/pulveriza-drones → pulveriza-drones
    return partes[partes.length - 1] || '';
  }

  // ════════════════════════════════════════════════════════
  // FUNÇÕES DE EXIBIÇÃO
  // ════════════════════════════════════════════════════════

  function mostrarErro(mensagem) {
    document.getElementById("loading-perfil").style.display = "none";
    document.getElementById("perfil-body").style.display = "";
    document.getElementById("perfil-body").innerHTML = 
      '<div class="vazio"><div class="vazio-icon">🔍</div><div class="vazio-title">' + mensagem + '</div></div>';
  }

  // ===== CARREGAR PERFIL PELO SLUG =====
  async function carregarPerfil() {
    const slug = getSlugFromURL();
    
    console.log('🔗 Slug na URL:', slug);
    
    if (!slug) {
      mostrarErro('Empresa não encontrada');
      return;
    }

    try {
      const resposta = await fetch('/.netlify/functions/empresas');
      if (!resposta.ok) throw new Error('Erro ao carregar dados');
      const dados = await resposta.json();
      
      console.log('📊 Empresas carregadas:', dados.empresas.length);
      
      const empresa = dados.empresas.find(e => e.slug === slug);
      
      if (!empresa) {
        console.warn('⚠️ Empresa não encontrada para o slug:', slug);
        mostrarErro('Empresa não encontrada');
        return;
      }
      
      console.log('✅ Empresa encontrada:', empresa.nome);
      renderizarPerfil(empresa);
      
    } catch (erro) {
      console.error('❌ Erro:', erro);
      mostrarErro('Erro ao carregar dados. Tente novamente.');
    }
  }

  // ===== RENDERIZAR PERFIL =====
  function renderizarPerfil(p) {
    console.log('🎨 Renderizando perfil:', p.nome);

    // Esconde loading
    document.getElementById("loading-perfil").style.display = "none";
    document.getElementById("perfil-top").style.display = "";
    document.getElementById("perfil-stats").style.display = "";
    document.getElementById("perfil-body").style.display = "";
    document.getElementById("cta-fixo").style.display = "";

    // Ícones
    const LOC_ICON = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>`;
    const SVG_STAR_STAT = `<svg width="26" height="26" viewBox="0 0 24 24" fill="#F59E0B" stroke="#F59E0B" stroke-width="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
    const SVG_CLIPBOARD = `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#16A34A" stroke-width="1.8"><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M9 12h6M9 16h4"/></svg>`;
    const SVG_SHIELD_STAT = `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#16A34A" stroke-width="1.8"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>`;
    const SVG_WPP = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>`;
    const SVG_ORC = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>`;

    // Avatar
    let avatarHtml = p.foto ? '<img src="' + p.foto + '" alt="' + p.nome + '">' : '';

    // TOPO
    document.getElementById("perfil-top").innerHTML =
      '<div class="perfil-avatar">' + avatarHtml + '</div>' +
      '<div class="perfil-nome">' + p.nome + '</div>' +
      '<div class="perfil-loc">' + LOC_ICON + ' ' + p.cidade + '</div>' +
      '<div class="perfil-badges">' +
        '<div class="disp-badge" style="background:' + (p.disponivel ? "#DCFCE7" : "#FEE2E2") + '">' +
          '<div class="disp-dot" style="background:' + (p.disponivel ? "#16A34A" : "#DC2626") + '"></div>' +
          '<span class="disp-txt" style="color:' + (p.disponivel ? "#16A34A" : "#DC2626") + '">' + (p.disponivel ? "Disponível agora" : "Indisponível") + '</span>' +
        '</div>' +
        (p.link_perfil ? '<a class="ver-perfil-btn" href="' + p.link_perfil + '" target="_blank" rel="noopener"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#16A34A" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Ver perfil completo ›</a>' : '') +
      '</div>';

    // ESTATÍSTICAS
    document.getElementById("perfil-stats").innerHTML =
      '<div class="stat-card"><div class="stat-icon-svg">' + SVG_STAR_STAT + '</div><div class="stat-val">' + p.avaliacao + '</div><div class="stat-stars">' + gerarEstrelas(p.avaliacao) + '</div><div class="stat-lbl">Avaliação</div></div>' +
      '<div class="stat-card"><div class="stat-icon-svg">' + SVG_CLIPBOARD + '</div><div class="stat-val">' + p.servicos + '</div><div class="stat-lbl">Serviços realizados</div></div>' +
      '<div class="stat-card"><div class="stat-icon-svg">' + SVG_SHIELD_STAT + '</div><div class="stat-val">' + (p.experiencia || "—") + (p.experiencia ? ' anos' : '') + '</div><div class="stat-lbl">Experiência</div></div>';

    // CORPO
    document.getElementById("perfil-body").innerHTML =
      '<div class="info-card"><h3>Sobre</h3><p>' + (p.bio || 'Empresa especializada em serviços agrícolas com drones.') + '</p></div>' +
      '<div class="info-card"><h3>Equipamento</h3><div class="equip-row"><div><div class="equip-lbl">Drone</div><div class="equip-val">' + (p.drone || '—') + '</div></div><div><div class="equip-lbl">Área máx/dia</div><div class="equip-val">' + (p.area_max || '—') + ' ha</div></div></div></div>' +
      '<div class="info-card"><h3>Culturas atendidas</h3><div class="cult-tags">' + (p.culturas && p.culturas.length > 0 ? p.culturas.map(c => '<span class="cult-tag" style="background:#16A34A18;color:#16A34A">' + c + '</span>').join("") : '<span style="color:#A8A29E;font-size:13px;">Nenhuma cultura cadastrada</span>') + '</div></div>' +
      '<div class="info-card">' +
        '<h3>Avaliações</h3>' +
        '<div id="lista-avaliacoes"><p style="color:#A8A29E;font-size:13px;">Carregando avaliações...</p></div>' +
        '<button onclick="irParaAvaliacao()" style="margin-top:12px;background:#F0EBE3;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;color:#57534E;cursor:pointer;">➕ Adicionar avaliação</button>' +
      '</div>';

    // BOTÕES DE CONTATO
    if (!p.disponivel) {
      document.getElementById("cta-fixo").innerHTML = '<div class="btn-unico">Indisponível no momento</div>';
    } else {
      let botoesHtml = '<div class="cta-btns">';
      if (p.orcamento) botoesHtml += '<a href="' + p.orcamento + '" target="_blank" class="btn-orc">' + SVG_ORC + 'Solicitar orçamento</a>';
      if (p.whatsapp) botoesHtml += '<a href="https://wa.me/' + p.whatsapp + '" target="_blank" class="btn-wpp">' + SVG_WPP + 'WhatsApp</a>';
      botoesHtml += '</div>';
      document.getElementById("cta-fixo").innerHTML = botoesHtml;
    }
  }

  // ===== GERAR ESTRELAS =====
  function gerarEstrelas(nota) {
    let html = '';
    const full = `<svg width="12" height="12" viewBox="0 0 24 24" fill="#F59E0B" stroke="#F59E0B" stroke-width="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
    const empty = `<svg width="12" height="12" viewBox="0 0 24 24" fill="#E5E7EB" stroke="#E5E7EB" stroke-width="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
    for (let i = 1; i <= 5; i++) {
      html += (nota >= i) ? full : empty;
    }
    return html;
  }

  // ════════════════════════════════════════════════════════
  // INICIALIZAÇÃO
  // ════════════════════════════════════════════════════════

  // Carrega o perfil
  carregarPerfil();

  // EXPOR FUNÇÕES PARA O HTML
  window.voltarHome = voltarHome;
  window.irParaAvaliacao = irParaAvaliacao;
</script>

</body>
</html>
