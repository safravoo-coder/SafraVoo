<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7GR2ZW1K2X"></script>
  <script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date()); gtag('config', 'G-7GR2ZW1K2X');
</script>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#16A34A"/>
  <title>SafraVoo — A melhor solução para a sua lavoura🌱</title>
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="web">

  <!-- ══════════════════════════════════
       TELA HOME
  ══════════════════════════════════ -->
  <div id="tela-home" class="pb80">
    <img src="layout.png" alt="SafraVoo" class="imagem-responsiva">
    <div class="header">
      <div class="header-top">
      </div>
      <div class="busca-filtro-row">
        <div class="search-wrap">
          <span class="search-icon"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" 
       stroke="#777" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
       <circle cx="11" cy="11" r="7"></circle>
       <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
       </svg></span>
          <input type="text" class="search-input" id="busca" placeholder=" Sua Cidade / Região..." oninput="onBuscaInput()" autocomplete="off"/>
          <div class="busca-sugestoes" id="busca-sugestoes"></div>
        </div>
        <button type="button" class="filtro-estado-btn" id="filtro-estado-btn" onclick="abrirFiltroEstado()">
          <span id="filtro-estado-label">Filtrar por<br>Estado...</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#777" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="4" y1="6" x2="20" y2="6"></line>
            <circle cx="9" cy="6" r="2" class="filtro-slider-dot"></circle>
            <line x1="4" y1="12" x2="20" y2="12"></line>
            <circle cx="15" cy="12" r="2" class="filtro-slider-dot"></circle>
            <line x1="4" y1="18" x2="20" y2="18"></line>
            <circle cx="11" cy="18" r="2" class="filtro-slider-dot"></circle>
          </svg>
        </button>
      </div>
      
      <!-- ══════════════════════════════════
           NOVA SEÇÃO: SERVIÇO DESEJADO
      ══════════════════════════════════ -->
      <h3 class="filtros-title">Serviço desejado</h3>
      <div class="servicos-container" id="servicos-container"></div>
      <!-- ══════════════════════════════════
           FIM DA NOVA SEÇÃO
      ══════════════════════════════════ -->

    </div>

    <div class="toggle-row">
      <button class="toggle-btn" onclick="toggleDisp()">
        <div class="dot" id="dot-disp"></div>
        <span id="toggle-txt">Mostrar só disponíveis</span>
      </button>
      <span class="count" id="count-txt"></span>
    </div>

    <div id="destaques-section">
      <div class="section-title">Destaques</div>
      <div class="destaques-scroll" id="destaques"></div>
    </div>

    <div class="banner-trust">
      <img src="banner-produtor.png" alt="Profissionais verificados. Equipamentos certificados.">
    </div>

    <div class="lista">
     <div class="lista-header">
  <div class="lista-title" id="lista-title">Especialistas para sua lavoura:</div>
  <select id="ordenar" onchange="filtrar()" class="select-ordem">
    <option value="padrao">Ordenar</option>
    <option value="avaliacao">Melhor avaliados</option>
    <option value="az">A a Z</option>
  </select>
</div>
      <div id="lista-empresas"></div>
    </div>

    <div class="banner">
      <div class="banner-txt">
        <strong>Seja um parceiro.</strong>
        <span>Cadastre a sua empresa de drones e comece a receber chamados</span>
      </div>
      <a href="https://safravoocadastro.netlify.app/" target="_blank" class="banner-btn">Cadastrar</a>
    </div>

  </div>

</div>

<!-- ══════════════════════════════════
     MODAL DE SELEÇÃO
══════════════════════════════════ -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h3 id="modal-titulo">Serviço</h3>
      <button class="modal-fechar" id="modal-fechar" aria-label="Fechar">✕</button>
    </div>
    <div class="modal-sub" id="modal-sub">Selecione as opções desejadas:</div>
    <div class="modal-opcoes" id="modal-opcoes"></div>
    <div class="modal-acoes">
      <button class="btn-aplicar" id="modal-aplicar">Aplicar filtro</button>
      <button class="btn-cancelar" id="modal-cancelar">Cancelar</button>
    </div>
  </div>
</div>

<script src="/script.js"></script>

</body>
</html>
